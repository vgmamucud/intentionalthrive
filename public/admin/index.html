<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Intentional Thrive — Admin</title>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <script>
    CMS.init({
      config: {
        backend: {
          name: 'github',
          repo: 'vgmamucud/intentionalthrive',
          branch: 'main',
          base_url: 'https://intentionalthrive.com',
          auth_endpoint: '/api/auth',
        },
        media_folder: 'public/uploads',
        public_folder: '/uploads',
        collections: [
          {
            name: 'articles',
            label: 'Articles',
            label_singular: 'Article',
            folder: 'src/content/articles',
            create: true,
            slug: '{{slug}}',
            extension: 'md',
            format: 'frontmatter',
            fields: [
              { label: 'Title', name: 'title', widget: 'string' },
              { label: 'Description', name: 'description', widget: 'text' },
              { label: 'Publish Date', name: 'pubDate', widget: 'string', default: 'June 2026' },
              {
                label: 'Pillar', name: 'pillar', widget: 'select',
                options: ['Money Mindset', 'Wealth in Practice', 'Intentional Living', 'The Journey'],
              },
              { label: 'Read Time', name: 'readTime', widget: 'string', default: '5 min' },
              { label: 'Draft', name: 'draft', widget: 'boolean', default: false },
              { label: 'Body', name: 'body', widget: 'markdown' },
            ],
          },
          {
            name: 'shows',
            label: 'Shows',
            label_singular: 'Show',
            folder: 'src/content/shows',
            create: true,
            slug: '{{slug}}',
            extension: 'json',
            format: 'json',
            fields: [
              { label: 'Title', name: 'title', widget: 'string' },
              {
                label: 'Type', name: 'type', widget: 'select',
                options: [{ label: 'Podcast', value: 'podcast' }, { label: 'YouTube', value: 'youtube' }],
              },
              { label: 'Platform', name: 'platform', widget: 'string', hint: 'e.g. Spotify, Apple Podcasts, YouTube' },
              { label: 'URL', name: 'url', widget: 'string' },
              { label: 'Embed URL', name: 'embedUrl', widget: 'string', required: false },
              { label: 'Description', name: 'description', widget: 'text' },
              { label: 'Published', name: 'published', widget: 'boolean', default: true },
            ],
          },
          {
            name: 'resources',
            label: 'Resources',
            label_singular: 'Resource',
            folder: 'src/content/resources',
            create: true,
            slug: '{{slug}}',
            extension: 'json',
            format: 'json',
            fields: [
              { label: 'Title', name: 'title', widget: 'string' },
              { label: 'Description', name: 'description', widget: 'text' },
              {
                label: 'Category', name: 'category', widget: 'select',
                options: ['Financial Planning', 'Insurance Guides', 'Career in Finance', 'Templates & Tools'],
              },
              { label: 'File or Link URL', name: 'fileUrl', widget: 'string' },
              { label: 'Published', name: 'published', widget: 'boolean', default: true },
            ],
          },
        ],
      },
    });
  </script>
</body>
</html>
